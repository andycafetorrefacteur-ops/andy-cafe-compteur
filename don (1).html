<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Andy Café — Merci ✿</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blush: #fdf0f0;
      --rose-lait: #f4c5c5;
      --rose-vif: #e8969a;
      --rose-profond: #c95f6b;
      --pivoine: #b04059;
      --prune: #8a3050;
      --blanc: #fffbfb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: var(--blush);
      font-family: 'Raleway', sans-serif;
      overflow: hidden;
    }

    /* ── Pétales fond ── */
    #petales {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .petale {
      position: absolute; opacity: 0;
      animation: tombePetale linear infinite;
    }
    @keyframes tombePetale {
      0%   { opacity: 0; transform: translateY(-60px) rotate(0deg) scale(.7); }
      8%   { opacity: .45; }
      88%  { opacity: .25; }
      100% { opacity: 0; transform: translateY(105vh) rotate(460deg) scale(1.1); }
    }

    /* ── Écrans ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 30px;
      opacity: 0; pointer-events: none;
      transition: opacity .6s ease;
      z-index: 2;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── Écran 1 — Saisie nom ── */
    #ecran1 { background: linear-gradient(160deg, #fce6ea 0%, #fdf0f0 60%, #f9e0e6 100%); }

    .logo-text {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(1.4rem, 4vw, 2rem); color: var(--prune);
      letter-spacing: .04em; margin-bottom: 6px;
    }
    .eyebrow {
      font-size: .62rem; letter-spacing: .28em; text-transform: uppercase;
      color: var(--rose-vif); margin-bottom: 48px; opacity: .8;
    }

    .sac-visual {
      width: min(280px, 70vw); height: min(280px, 70vw);
      background: linear-gradient(145deg, #fff5f6, #fce8ea);
      border: 1.5px solid var(--rose-lait);
      border-radius: 50%; margin-bottom: 40px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      box-shadow: 0 24px 70px rgba(176,64,89,.13);
      position: relative; overflow: hidden;
    }
    .sac-visual::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 0%, rgba(244,197,197,.4) 0%, transparent 60%);
    }
    .sac-ico { margin-bottom: 10px; position: relative; z-index: 1; animation: batCoeur 2.4s ease-in-out infinite; }
    @keyframes batCoeur {
      0%,100% { transform: scale(1); }
      14% { transform: scale(1.08); }
      28% { transform: scale(1); }
      42% { transform: scale(1.05); }
    }
    .sac-title {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(.85rem, 2.5vw, 1.1rem); color: var(--prune);
      text-align: center; line-height: 1.5; position: relative; z-index: 1;
      padding: 0 20px;
    }
    .sac-prix {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 1.8rem); color: var(--rose-profond);
      margin-top: 6px; position: relative; z-index: 1;
    }

    .input-label {
      font-size: .65rem; letter-spacing: .22em; text-transform: uppercase;
      color: var(--rose-profond); margin-bottom: 12px; opacity: .75;
    }
    .nom-input {
      width: min(400px, 90vw);
      padding: 18px 24px;
      border: 2px solid var(--rose-lait);
      border-radius: 50px;
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: var(--prune); background: rgba(255,255,255,.85);
      text-align: center; outline: none;
      transition: border .3s, box-shadow .3s;
      margin-bottom: 24px;
    }
    .nom-input:focus {
      border-color: var(--rose-vif);
      box-shadow: 0 0 0 4px rgba(232,150,154,.15);
    }
    .nom-input::placeholder { color: rgba(138,48,80,.35); }

    .btn-confirmer {
      width: min(400px, 90vw);
      padding: 20px 32px;
      background: linear-gradient(135deg, var(--rose-profond), var(--pivoine));
      color: white; border: none; border-radius: 50px;
      font-family: 'Raleway', sans-serif; font-weight: 500;
      font-size: clamp(.8rem, 2.2vw, .95rem); letter-spacing: .2em; text-transform: uppercase;
      cursor: pointer; box-shadow: 0 10px 35px rgba(176,64,89,.3);
      transition: all .35s ease; position: relative; overflow: hidden;
    }
    .btn-confirmer::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
      opacity: 0; transition: opacity .3s;
    }
    .btn-confirmer:active { transform: scale(.97); box-shadow: 0 6px 20px rgba(176,64,89,.25); }
    .btn-confirmer:active::after { opacity: 1; }

    /* ── Écran 2 — Merci ── */
    #ecran2 {
      background: linear-gradient(160deg, #fce6ea 0%, #fdf0f0 50%, #f7d0d8 100%);
    }

    .merci-cercle {
      width: min(320px, 78vw); height: min(320px, 78vw);
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(255,255,255,.9), rgba(252,232,234,.8));
      border: 2px solid rgba(244,197,197,.6);
      box-shadow: 0 30px 90px rgba(176,64,89,.18);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin-bottom: 40px;
      animation: pulseDouce 3s ease-in-out infinite;
      position: relative; overflow: hidden;
    }
    .merci-cercle::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(244,197,197,.5) 0%, transparent 65%);
    }
    @keyframes pulseDouce {
      0%,100% { box-shadow: 0 30px 90px rgba(176,64,89,.18); }
      50% { box-shadow: 0 30px 90px rgba(176,64,89,.28), 0 0 60px rgba(232,150,154,.2); }
    }

    .merci-fleur { font-size: clamp(3rem, 8vw, 4.5rem); margin-bottom: 12px; position: relative; z-index: 1; animation: tourneFleur 8s linear infinite; }
    @keyframes tourneFleur { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .merci-nom {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(1.6rem, 5vw, 2.4rem); color: var(--prune);
      position: relative; z-index: 1; text-align: center; padding: 0 20px;
    }
    .merci-msg {
      font-size: clamp(.75rem, 2vw, .9rem); color: var(--rose-profond);
      opacity: .75; margin-top: 6px; position: relative; z-index: 1;
      letter-spacing: .05em;
    }

    .merci-titre {
      font-family: 'Playfair Display', serif; font-weight: 400;
      font-size: clamp(1.8rem, 5.5vw, 2.8rem); color: var(--prune);
      text-align: center; line-height: 1.2; margin-bottom: 14px;
    }
    .merci-titre em { font-style: italic; color: var(--rose-profond); }

    .merci-sous {
      font-size: clamp(.78rem, 2vw, .92rem); color: var(--pivoine);
      opacity: .7; text-align: center; line-height: 1.8;
      max-width: 380px; margin-bottom: 40px;
    }

    .compteur-mini {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,.7); backdrop-filter: blur(8px);
      border: 1.5px solid var(--rose-lait); border-radius: 50px;
      padding: 14px 28px; margin-bottom: 36px;
    }
    .compteur-mini-num {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 1.8rem; color: var(--rose-profond); line-height: 1;
    }
    .compteur-mini-label {
      font-size: .62rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--prune); opacity: .6; line-height: 1.5;
    }

    .btn-retour {
      padding: 14px 36px;
      background: transparent; color: var(--rose-profond);
      border: 1.5px solid var(--rose-lait); border-radius: 50px;
      font-family: 'Raleway', sans-serif; font-size: .72rem;
      letter-spacing: .18em; text-transform: uppercase;
      cursor: pointer; transition: all .3s;
    }
    .btn-retour:active { background: rgba(244,197,197,.3); }

    /* ── Confettis ── */
    #confettis {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 10; overflow: hidden;
      display: none;
    }
    .confetti {
      position: absolute;
      top: -20px;
      animation: tombeConfetti linear forwards;
      border-radius: 50%;
    }
    @keyframes tombeConfetti {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(.5); }
    }

    /* ── Noms qui s'affichent ── */
    .nom-tag {
      position: fixed;
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(.8rem, 2vw, 1rem); color: var(--rose-profond);
      opacity: 0; pointer-events: none; z-index: 5;
      animation: flotteNom 4s ease forwards;
    }
    @keyframes flotteNom {
      0%   { opacity: 0; transform: translateY(0) scale(.8); }
      20%  { opacity: .8; transform: translateY(-20px) scale(1); }
      80%  { opacity: .6; transform: translateY(-60px) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(.9); }
    }
  </style>
</head>
<body>

<div id="petales"></div>
<div id="confettis"></div>

<!-- Écran 1 — Saisie -->
<div class="screen active" id="ecran1">
  <div class="logo-text">Andy Café Torréfacteur</div>
  <div class="eyebrow">✿ Par les femmes · Pour les femmes ✿</div>

  <div class="sac-visual">
    <div class="sac-ico">
      <svg width="110" height="100" viewBox="0 0 110 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Pétales formant un cœur -->
        <!-- Rangée du haut gauche -->
        <ellipse cx="28" cy="22" rx="13" ry="20" fill="#f4c5c5" opacity=".85" transform="rotate(-40 28 22)"/>
        <ellipse cx="22" cy="28" rx="11" ry="18" fill="#e8969a" opacity=".7" transform="rotate(-55 22 28)"/>
        <!-- Rangée du haut droite -->
        <ellipse cx="82" cy="22" rx="13" ry="20" fill="#f4c5c5" opacity=".85" transform="rotate(40 82 22)"/>
        <ellipse cx="88" cy="28" rx="11" ry="18" fill="#e8969a" opacity=".7" transform="rotate(55 88 28)"/>
        <!-- Côté gauche -->
        <ellipse cx="14" cy="50" rx="12" ry="20" fill="#f4c5c5" opacity=".8" transform="rotate(-10 14 50)"/>
        <ellipse cx="18" cy="44" rx="10" ry="16" fill="#e8969a" opacity=".65" transform="rotate(-25 18 44)"/>
        <!-- Côté droit -->
        <ellipse cx="96" cy="50" rx="12" ry="20" fill="#f4c5c5" opacity=".8" transform="rotate(10 96 50)"/>
        <ellipse cx="92" cy="44" rx="10" ry="16" fill="#e8969a" opacity=".65" transform="rotate(25 92 44)"/>
        <!-- Bas gauche -->
        <ellipse cx="30" cy="76" rx="12" ry="18" fill="#e8969a" opacity=".75" transform="rotate(-130 30 76)"/>
        <ellipse cx="24" cy="68" rx="10" ry="15" fill="#c95f6b" opacity=".6" transform="rotate(-145 24 68)"/>
        <!-- Bas droite -->
        <ellipse cx="80" cy="76" rx="12" ry="18" fill="#e8969a" opacity=".75" transform="rotate(130 80 76)"/>
        <ellipse cx="86" cy="68" rx="10" ry="15" fill="#c95f6b" opacity=".6" transform="rotate(145 86 68)"/>
        <!-- Pointe bas centre -->
        <ellipse cx="55" cy="90" rx="10" ry="16" fill="#c95f6b" opacity=".8" transform="rotate(0 55 90)"/>
        <ellipse cx="47" cy="84" rx="9" ry="14" fill="#b04059" opacity=".65" transform="rotate(-20 47 84)"/>
        <ellipse cx="63" cy="84" rx="9" ry="14" fill="#b04059" opacity=".65" transform="rotate(20 63 84)"/>
        <!-- Centre haut gauche -->
        <ellipse cx="38" cy="32" rx="11" ry="17" fill="#f9dada" opacity=".9" transform="rotate(-20 38 32)"/>
        <!-- Centre haut droite -->
        <ellipse cx="72" cy="32" rx="11" ry="17" fill="#f9dada" opacity=".9" transform="rotate(20 72 32)"/>
        <!-- Centre milieu -->
        <ellipse cx="38" cy="58" rx="10" ry="16" fill="#f4c5c5" opacity=".8" transform="rotate(-15 38 58)"/>
        <ellipse cx="72" cy="58" rx="10" ry="16" fill="#f4c5c5" opacity=".8" transform="rotate(15 72 58)"/>
        <ellipse cx="55" cy="52" rx="11" ry="17" fill="#fce8ea" opacity=".95" transform="rotate(0 55 52)"/>
        <!-- Petit cœur central -->
        <path d="M55 62 C55 62 42 52 42 44 C42 39 46 36 50 37 C52 38 54 40 55 42 C56 40 58 38 60 37 C64 36 68 39 68 44 C68 52 55 62 55 62Z" fill="#b04059" opacity=".9"/>
      </svg>
    </div>
    <div class="sac-title">Sac par les femmes<br>pour les femmes · 400g</div>
    <div class="sac-prix">28 $</div>
  </div>

  <div class="input-label">Votre prénom</div>
  <input
    class="nom-input" id="nomInput"
    type="text" placeholder="Marie, Sophie, Isabelle…"
    autocomplete="off" autocorrect="off" spellcheck="false"
    maxlength="30"
  />
  <button class="btn-confirmer" id="btnConfirmer" onclick="confirmer()">
    ✿ &nbsp; Je confirme mon don &nbsp; ✿
  </button>
</div>

<!-- Écran 2 — Merci -->
<div class="screen" id="ecran2">
  <div class="merci-cercle">
    <div class="merci-fleur">
      <svg width="80" height="73" viewBox="0 0 110 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="28" cy="22" rx="13" ry="20" fill="#f4c5c5" opacity=".85" transform="rotate(-40 28 22)"/>
        <ellipse cx="82" cy="22" rx="13" ry="20" fill="#f4c5c5" opacity=".85" transform="rotate(40 82 22)"/>
        <ellipse cx="14" cy="50" rx="12" ry="20" fill="#f4c5c5" opacity=".8" transform="rotate(-10 14 50)"/>
        <ellipse cx="96" cy="50" rx="12" ry="20" fill="#f4c5c5" opacity=".8" transform="rotate(10 96 50)"/>
        <ellipse cx="30" cy="76" rx="12" ry="18" fill="#e8969a" opacity=".75" transform="rotate(-130 30 76)"/>
        <ellipse cx="80" cy="76" rx="12" ry="18" fill="#e8969a" opacity=".75" transform="rotate(130 80 76)"/>
        <ellipse cx="55" cy="90" rx="10" ry="16" fill="#c95f6b" opacity=".8"/>
        <ellipse cx="38" cy="32" rx="11" ry="17" fill="#f9dada" opacity=".9" transform="rotate(-20 38 32)"/>
        <ellipse cx="72" cy="32" rx="11" ry="17" fill="#f9dada" opacity=".9" transform="rotate(20 72 32)"/>
        <ellipse cx="55" cy="52" rx="11" ry="17" fill="#fce8ea" opacity=".95"/>
        <path d="M55 62 C55 62 42 52 42 44 C42 39 46 36 50 37 C52 38 54 40 55 42 C56 40 58 38 60 37 C64 36 68 39 68 44 C68 52 55 62 55 62Z" fill="#b04059" opacity=".9"/>
      </svg>
    </div>
    <div class="merci-nom" id="merciNom">Marie</div>
    <div class="merci-msg">merci du fond du cœur</div>
  </div>

  <h2 class="merci-titre">Un geste qui<br><em>change des vies</em></h2>
  <p class="merci-sous">Votre achat soutient directement La Séjournelle<br>et Maison Flavie à Shawinigan. Merci ✿</p>

  <div class="compteur-mini">
    <div class="compteur-mini-num" id="compteurMini">—</div>
    <div class="compteur-mini-label">sacs vendus<br>pour la cause</div>
  </div>

  <button class="btn-retour" onclick="retour()">← Retour</button>
</div>

<script>
  var API_URL = 'https://andy-cafe-compteur.vercel.app/api';

  /* ── Pétales de fond ── */
  (function() {
    var field = document.getElementById('petales');
    var colors = ['#f9dada','#f4c5c5','#e8969a','#fce8ea','#f7d0d8','#fad2da','#c8dbc0'];
    for (var i = 0; i < 35; i++) {
      (function() {
        var el = document.createElementNS('http://www.w3.org/2000/svg','svg');
        var size = 8 + Math.random() * 16;
        var col = colors[Math.floor(Math.random() * colors.length)];
        el.setAttribute('viewBox','0 0 40 52');
        el.setAttribute('width', size);
        el.setAttribute('height', size * 1.35);
        el.innerHTML = '<ellipse cx="20" cy="26" rx="14" ry="23" fill="'+col+'" opacity=".65"/>';
        el.classList.add('petale');
        el.style.left = Math.random() * 100 + 'vw';
        var dur = 7 + Math.random() * 10;
        var delay = Math.random() * 14;
        el.style.animation = 'tombePetale ' + dur + 's ' + delay + 's linear infinite';
        field.appendChild(el);
      })();
    }
  })();

  /* ── Confettis ── */
  function lancerConfettis() {
    var container = document.getElementById('confettis');
    container.style.display = 'block';
    var couleurs = ['#f4c5c5','#e8969a','#c95f6b','#b04059','#fce8ea','#8fa882','#f7d0d8','#fad2da'];
    var formes = ['50%', '0%', '4px'];

    for (var i = 0; i < 80; i++) {
      (function(index) {
        setTimeout(function() {
          var el = document.createElement('div');
          el.classList.add('confetti');
          var size = 6 + Math.random() * 10;
          el.style.width = size + 'px';
          el.style.height = size + 'px';
          el.style.left = Math.random() * 100 + 'vw';
          el.style.background = couleurs[Math.floor(Math.random() * couleurs.length)];
          el.style.borderRadius = formes[Math.floor(Math.random() * formes.length)];
          var dur = 2.5 + Math.random() * 2;
          el.style.animation = 'tombeConfetti ' + dur + 's ease forwards';
          container.appendChild(el);
          setTimeout(function() { el.remove(); }, dur * 1000 + 100);
        }, index * 25);
      })(i);
    }

    setTimeout(function() { container.style.display = 'none'; }, 4000);
  }

  /* ── Nom flottant ── */
  function afficherNomFlottant(nom) {
    var el = document.createElement('div');
    el.classList.add('nom-tag');
    el.textContent = '✿ ' + nom;
    el.style.left = (20 + Math.random() * 60) + 'vw';
    el.style.top = (30 + Math.random() * 40) + 'vh';
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 4200);
  }

  /* ── Confirmer ── */
  function confirmer() {
    var nom = document.getElementById('nomInput').value.trim();
    if (!nom) {
      document.getElementById('nomInput').focus();
      document.getElementById('nomInput').style.borderColor = '#c95f6b';
      setTimeout(function() {
        document.getElementById('nomInput').style.borderColor = '#f4c5c5';
      }, 1500);
      return;
    }

    var btn = document.getElementById('btnConfirmer');
    btn.disabled = true;
    btn.textContent = '✿  Merci  ✿';

    // Incrémenter le compteur
    fetch(API_URL + '/admin?action=increment&password=andycafe2026')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('merciNom').textContent = nom;
        document.getElementById('compteurMini').textContent = data.sacs_vendus || '—';

        // Basculer vers écran merci
        document.getElementById('ecran1').classList.remove('active');
        document.getElementById('ecran2').classList.add('active');

        // Animations
        lancerConfettis();
        setTimeout(function() { afficherNomFlottant(nom); }, 800);
        setTimeout(function() { afficherNomFlottant(nom); }, 1800);
      })
      .catch(function() {
        // Même en cas d'erreur réseau, montrer l'écran merci
        document.getElementById('merciNom').textContent = nom;
        document.getElementById('ecran1').classList.remove('active');
        document.getElementById('ecran2').classList.add('active');
        lancerConfettis();
      });
  }

  /* ── Retour ── */
  function retour() {
    document.getElementById('ecran2').classList.remove('active');
    document.getElementById('ecran1').classList.add('active');
    document.getElementById('nomInput').value = '';
    document.getElementById('btnConfirmer').disabled = false;
    document.getElementById('btnConfirmer').textContent = '✿   Je confirme mon don   ✿';
    document.getElementById('compteurMini').textContent = '—';
  }

  /* ── Enter pour confirmer ── */
  document.getElementById('nomInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') confirmer();
  });
</script>
</body>
</html>
